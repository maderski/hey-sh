name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect bump type from PR labels
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          LABELS=$(gh pr list --state merged --base main \
            --search "$SHA" --json labels \
            --jq '.[0].labels[].name' 2>/dev/null || true)
          if echo "$LABELS" | grep -qi "^major$"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qi "^minor$"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT=$(grep -oP '(?<=__version__ = ")[^"]+' hey/__init__.py)
          NEW=$(python3 - <<EOF
          parts = "$CURRENT".split(".")
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          bump = "${{ steps.bump.outputs.type }}"
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          print(f"{major}.{minor}.{patch}")
          EOF
          )
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" hey/__init__.py
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git add hey/__init__.py
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }} [skip ci]"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
