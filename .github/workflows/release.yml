name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Serialize release runs so each job derives its version from a fully-settled
# tag state. cancel-in-progress: false queues rather than drops concurrent
# triggers, preventing lost releases when multiple PRs merge in quick succession.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get merged PR labels
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch all tags up front so subsequent guards and version derivation
          # always operate on fully-settled remote tag state.
          git fetch --tags

          SHA="${{ github.sha }}"

          # Guard: skip if this commit already produced a release.
          # The bump commit (tagged as the release) has github.sha as its direct
          # parent, so checking each tag's parent is a reliable idempotency test
          # that prevents re-runs or retries from minting an extra version bump.
          EXISTING=$(git tag --sort=-v:refname \
            | { grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' || true; } \
            | while IFS= read -r tag; do
                parent=$(git rev-parse "${tag}^" 2>/dev/null) || continue
                [ "$parent" = "$SHA" ] && echo "$tag" && break
              done)
          if [ -n "$EXISTING" ]; then
            echo "Commit $SHA already released as $EXISTING — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
            --jq '.[0].labels[].name' 2>/dev/null || true)

          # Stop here if this is the automated version bump PR
          if echo "$LABELS" | grep -qi "^skip-release$"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Determine bump type from PR labels (default: patch)
          if echo "$LABELS" | grep -qi "^major$"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qi "^minor$"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate new version
        if: steps.pr.outputs.skip != 'true'
        id: version
        run: |
          # Use the latest git tag as the base so that a pending version bump PR
          # on main does not cause the same tag to be recomputed and recreated.
          LATEST_TAG=$(git tag --sort=-v:refname \
            | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          # Fall back to the declared package version when no semver tags exist,
          # preserving version continuity on first run or tagless repos.
          PKG_VERSION=$(grep -oP '(?<=__version__ = ")[^"]+' hey/__init__.py)
          CURRENT="${LATEST_TAG:-$PKG_VERSION}"
          CURRENT="${CURRENT#v}"
          NEW=$(python3 - <<EOF
          parts = "$CURRENT".split(".")
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          bump = "${{ steps.pr.outputs.bump }}"
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          print(f"{major}.{minor}.{patch}")
          EOF
          )
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the skip-release label exists
          gh label create "skip-release" --color "cccccc" \
            --description "Skip automated release for this PR" 2>/dev/null || true

          # Update __version__ on a branch so the release tag points to code
          # that declares the correct version, not the previous one.
          BRANCH="chore/bump-${{ steps.version.outputs.tag }}"
          git checkout -b "$BRANCH"
          python3 -c "
          import re
          with open('hey/__init__.py') as f:
              content = f.read()
          content = re.sub(r'__version__ = \"[^\"]+\"', '__version__ = \"${{ steps.version.outputs.new }}\"', content)
          with open('hey/__init__.py', 'w') as f:
              f.write(content)
          "
          git add hey/__init__.py
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"

          # Use a PAT so the branch push triggers normal CI checks on the PR.
          # GITHUB_TOKEN-generated events are ignored by Actions and would leave
          # required status checks permanently pending, blocking the PR merge.
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}"
          git push origin "$BRANCH"

          # Tag the bump commit (not main HEAD) so __version__ matches the tag.
          # Tag pushes use GITHUB_TOKEN — they do not need to trigger workflow runs.
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create release and open bump PR
        if: steps.pr.outputs.skip != 'true'
        env:
          # Use a PAT so gh pr create triggers normal CI on the bump PR.
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.tag }}" \
            --body "Automated version bump for release ${{ steps.version.outputs.tag }}. Merge at your convenience — subsequent releases are not blocked by this PR." \
            --base main \
            --head "chore/bump-${{ steps.version.outputs.tag }}" \
            --label "skip-release"
