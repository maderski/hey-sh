name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get merged PR labels
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          LABELS=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
            --jq '.[0].labels[].name' 2>/dev/null || true)

          # Stop here if this is the automated version bump PR
          if echo "$LABELS" | grep -qi "^skip-release$"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Determine bump type from PR labels (default: patch)
          if echo "$LABELS" | grep -qi "^major$"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -qi "^minor$"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate new version
        if: steps.pr.outputs.skip != 'true'
        id: version
        run: |
          # Use the latest git tag as the base so that a pending version bump PR
          # on main does not cause the same tag to be recomputed and recreated.
          LATEST_TAG=$(git tag --sort=-v:refname \
            | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          CURRENT="${LATEST_TAG:-v0.0.0}"
          CURRENT="${CURRENT#v}"
          NEW=$(python3 - <<EOF
          parts = "$CURRENT".split(".")
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          bump = "${{ steps.pr.outputs.bump }}"
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          print(f"{major}.{minor}.{patch}")
          EOF
          )
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit version bump, tag, and open PR
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the skip-release label exists
          gh label create "skip-release" --color "#cccccc" \
            --description "Skip automated release for this PR" 2>/dev/null || true

          # Update __version__ on a branch so the release tag points to code
          # that declares the correct version, not the previous one.
          BRANCH="chore/bump-${{ steps.version.outputs.tag }}"
          git checkout -b "$BRANCH"
          python3 -c "
          import re
          with open('hey/__init__.py') as f:
              content = f.read()
          content = re.sub(r'__version__ = \"[^\"]+\"', '__version__ = \"${{ steps.version.outputs.new }}\"', content)
          with open('hey/__init__.py', 'w') as f:
              f.write(content)
          "
          git add hey/__init__.py
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }}"
          git push origin "$BRANCH"

          # Tag the bump commit (not main HEAD) so __version__ matches the tag.
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.tag }}" \
            --body "Automated version bump for release ${{ steps.version.outputs.tag }}. Merge at your convenience — subsequent releases are not blocked by this PR." \
            --base main \
            --head "$BRANCH" \
            --label "skip-release"
